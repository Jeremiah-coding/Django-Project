<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #f3f6fb;
            color: #1d2939;
        }
        .container {
            max-width: 760px;
            margin: 70px auto;
            padding: 28px;
            background: #ffffff;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin-top: 0;
            color: #0f4c81;
        }
        p {
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        a {
            text-decoration: none;
            background: #0f4c81;
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 8px;
        }
        a:hover {
            background: #0c3b63;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Welcome to the University Portal</h1>
        <p>This Django project manages university departments, courses, and students using a PostgreSQL database in Docker.</p>
        <div class="links">
            <a href="/departments/">Go to Departments</a>
            <a href="/courses/">Go to Courses</a>
        </div>
    </main>
</body>
</html>
