<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal | Department Detail</title>
    <style>
        :root {
            --navy: #0b2441;
            --blue: #113d6f;
            --gold: #c8a760;
            --ink: #1a2433;
            --white: #ffffff;
            --border: #d6dde7;
        }

        body {
            margin: 0;
            font-family: Cambria, "Times New Roman", Times, serif;
            color: var(--ink);
            background: linear-gradient(180deg, #eef3f9 0%, #f9fbfd 100%);
        }

        .masthead {
            background: var(--navy);
            color: var(--white);
            border-bottom: 4px solid var(--gold);
            padding: 16px 20px;
        }

        .masthead-inner {
            max-width: 860px;
            margin: 0 auto;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 30px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 14px 28px rgba(11, 36, 65, 0.09);
        }

        h1 {
            margin-top: 0;
            color: var(--navy);
        }

        .meta {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 8px 14px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .label {
            font-weight: 700;
            color: #22344b;
        }

        .actions {
            margin-top: 24px;
        }

        .button {
            display: inline-block;
            background: var(--blue);
            color: var(--white);
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 6px;
            font-size: 0.92rem;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
        }

        .button:hover {
            background: var(--navy);
        }

        @media (max-width: 640px) {
            .container {
                margin: 18px 12px;
                padding: 22px;
            }

            .meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="masthead-inner">University Academic Records Portal</div>
    </header>

    <main class="container">
        <h1>{{ department.name }}</h1>

        <div class="meta">
            <div class="label">Department Code</div><div>{{ department.code }}</div>
            <div class="label">Building Name</div><div>{{ department.building_name }}</div>
            <div class="label">Description</div><div>{{ department.description }}</div>
            <div class="label">Created At</div><div>{{ department.created_at }}</div>
        </div>

        <div class="actions">
            <a class="button" href="/departments/">Back to Departments</a>
        </div>
    </main>
</body>
</html>
